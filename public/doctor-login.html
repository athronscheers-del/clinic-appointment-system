<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Login - MediCare Clinic</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a href="index.html" class="back-home">&larr; Back to Home</a>
  <div class="auth-page">
    <div class="auth-box">
      <h2>👨‍⚕️ Doctor Login</h2>
      <p class="auth-subtitle">Access your appointments and patient list</p>

      <div id="errorMsg" class="error-msg"></div>

      <form id="doctorLoginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required />
        </div>
        <button type="submit" class="btn btn-filled auth-btn">Sign In</button>
      </form>

      <div class="auth-footer">
        New doctor? <a href="doctor-register.html">Register with your code</a>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    document.getElementById('doctorLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const result = await apiRequest('/auth/doctor/login', { email, password });
        saveSession(result.token, 'doctor', result.user);
        redirectByRole('doctor');
      } catch (err) {
        showError('errorMsg', err.message);
      }
    });
  </script>
</body>
</html>
