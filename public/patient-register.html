<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Registration - MediCare Clinic</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a href="index.html" class="back-home">&larr; Back to Home</a>
  <div class="auth-page">
    <div class="auth-box">
      <h2>🧑 Patient Registration</h2>
      <p class="auth-subtitle">Create your account to get started</p>

      <div id="errorMsg" class="error-msg"></div>

      <form id="patientRegisterForm">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" required />
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" minlength="6" required />
        </div>
        <button type="submit" class="btn btn-filled auth-btn">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="patient-login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    document.getElementById('patientRegisterForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fullName = document.getElementById('fullName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const result = await apiRequest('/auth/patient/register', { fullName, email, password });
        saveSession(result.token, 'patient', result.user);
        redirectByRole('patient');
      } catch (err) {
        showError('errorMsg', err.message);
      }
    });
  </script>
</body>
</html>
