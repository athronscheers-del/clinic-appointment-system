<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Registration - MediCare Clinic</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a href="index.html" class="back-home">&larr; Back to Home</a>
  <div class="auth-page">
    <div class="auth-box">
      <h2>👨‍⚕️ Doctor Registration</h2>
      <p class="auth-subtitle">Use the authorization code provided by admin</p>

      <div id="errorMsg" class="error-msg"></div>

      <form id="doctorRegisterForm">
        <div class="form-group">
          <label for="doctorCode">Authorization Code</label>
          <input type="text" id="doctorCode" placeholder="e.g. DOC001" required />
        </div>
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" required />
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required />
        </div>
        <div class="form-group">
          <label for="specialization">Specialization</label>
          <select id="specialization" required>
            <option value="">Select specialization</option>
            <option>Cardiology</option>
            <option>Neurology</option>
            <option>Dermatology</option>
            <option>Pediatrics</option>
            <option>Orthopedics</option>
            <option>Gynecology</option>
            <option>Ophthalmology</option>
            <option>General Medicine</option>
          </select>
        </div>
        <div class="form-group">
          <label for="experience">Years of Experience</label>
          <input type="number" id="experience" min="15" value="15" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" minlength="6" required />
        </div>
        <button type="submit" class="btn btn-filled auth-btn">Register</button>
      </form>

      <div class="auth-footer">
        Already registered? <a href="doctor-login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    document.getElementById('doctorRegisterForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const doctorCode = document.getElementById('doctorCode').value;
      const fullName = document.getElementById('fullName').value;
      const email = document.getElementById('email').value;
      const specialization = document.getElementById('specialization').value;
      const experience = document.getElementById('experience').value;
      const password = document.getElementById('password').value;

      try {
        const result = await apiRequest('/auth/doctor/register', {
          doctorCode, fullName, email, specialization, experience, password
        });
        saveSession(result.token, 'doctor', result.user);
        redirectByRole('doctor');
      } catch (err) {
        showError('errorMsg', err.message);
      }
    });
  </script>
</body>
</html>
